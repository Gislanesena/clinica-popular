# pytest.ini — configuração do pytest (rodar testes: cd backend && pytest)
#
# O pytest é o programa que executa os testes automáticos em backend/tests/.
# Este arquivo diz onde estão os testes e como o Python encontra o pacote "app".
#
[pytest]
testpaths = tests          # Pasta com test_api.py
pythonpath = .             # Permite "from app.main import ..." nos testes
